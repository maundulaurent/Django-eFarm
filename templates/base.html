<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}c-SHAMBA Farm{% endblock %}</title>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- Top Bar -->
    <div class="bg-green-700 text-white text-sm py-2">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center">
                <!-- Left side - Contact info -->
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                        </svg>
                        <span>+254 (796) 111-220</span>
                    </div>
                    <div class="flex items-center space-x-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <span>hello@machcom.co.ke</span>
                    </div>
                </div>
                
                <!-- Right side - Social links and hours -->
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-3">
                        <a href="#" class="hover:text-green-200 transition-colors">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/>
                            </svg>
                        </a>
                        <a href="#" class="hover:text-green-200 transition-colors">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12.315 2c2.43 0 2.784.013 3.808.06 1.064.049 1.791.218 2.427.465.66.256 1.216.6 1.772 1.156a4.908 4.908 0 0 1 1.156 1.772c.247.636.416 1.363.465 2.427.048 1.067.06 1.407.06 4.123v.08c0 2.643-.012 2.987-.06 4.043-.049 1.064-.218 1.791-.465 2.427a4.884 4.884 0 0 1-1.156 1.772 4.915 4.915 0 0 1-1.772 1.156c-.636.247-1.363.416-2.427.465-1.067.048-1.407.06-4.123.06h-.08c-2.643 0-2.987-.012-4.043-.06-1.064-.049-1.791-.218-2.427-.465a4.89 4.89 0 0 1-1.772-1.156 4.904 4.904 0 0 1-1.156-1.772c-.247-.636-.416-1.363-.465-2.427-.047-1.024-.06-1.379-.06-3.808v-.63c0-2.43.013-2.784.06-3.808.049-1.064.218-1.791.465-2.427a4.88 4.88 0 0 1 1.156-1.772A4.897 4.897 0 0 1 5.45 2.525c.636-.247 1.363-.416 2.427-.465C8.901 2.013 9.256 2 11.685 2h.63zm-.22 1.802h-.441c-2.384 0-2.668.01-3.615.053-.902.04-1.392.184-1.718.306-.43.16-.736.353-1.058.675-.323.322-.516.628-.675 1.058-.122.326-.266.816-.306 1.718-.043.947-.053 1.231-.053 3.614v.441c0 2.384.01 2.668.053 3.614.04.902.184 1.392.306 1.718.16.43.353.736.675 1.058.322.323.628.516 1.058.675.326.122.816.266 1.718.306.947.043 1.231.053 3.614.053h.441c2.384 0 2.668-.01 3.614-.053.902-.04 1.392-.184 1.718-.306.43-.16.736-.353 1.058-.675.323-.322.516-.628.675-1.058.122-.326.266-.816.306-1.718.043-.947.053-1.231.053-3.614v-.441c0-2.384-.01-2.668-.053-3.614-.04-.902-.184-1.392-.306-1.718-.16-.43-.353-.736-.675-1.058-.322-.323-.628-.516-1.058-.675-.326-.122-.816-.266-1.718-.306-.947-.043-1.23-.053-3.613-.053zm0 4.934a3.861 3.861 0 1 0 0 7.722 3.861 3.861 0 0 0 0-7.722zm0 1.802a2.059 2.059 0 1 1 0 4.118 2.059 2.059 0 0 1 0-4.118zm3.44-2.941a.902.902 0 1 1 1.804 0 .902.902 0 0 1-1.804 0z"/>
                            </svg>
                        </a>
                        <a href="#" class="hover:text-green-200 transition-colors">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M23.953 4.57a10 10 0 0 1-2.825.775 4.958 4.958 0 0 0 2.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 0 0-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 0 0-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 0 1-2.228-.616v.06a4.923 4.923 0 0 0 3.946 4.827 4.996 4.996 0 0 1-2.212.085 4.937 4.937 0 0 0 4.604 3.417 9.868 9.868 0 0 1-6.102 2.104c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 0 0 7.557 2.209c9.054 0 13.999-7.496 13.999-13.986 0-.209 0-.42-.015-.63a9.936 9.936 0 0 0 2.46-2.548l-.047-.02z"/>
                            </svg>
                        </a>
                    </div>
                    <div class="h-4 w-px bg-green-500"></div>
                    <div class="flex items-center space-x-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>Mon-Sat: 8am - 6pm</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

<!-- Main Navigation -->
    <nav class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <!-- Logo/Brand with better styling -->
                <a class="flex items-center space-x-2 group" href="{% url 'home' %}">
                    <span class="text-2xl group-hover:scale-110 transition-transform duration-200">🌿</span>
                    <span class="text-gray-800 text-xl font-medium tracking-tight hover:text-green-600 transition-colors">
                        CSHAMBA <span class="font-light">Farm</span>
                    </span>
                </a>
                
                <!-- Mobile menu button - refined -->
                <div class="sm:hidden">
                    <button type="button" class="text-gray-600 hover:text-green-600 focus:outline-none p-2 rounded-lg hover:bg-gray-50 transition-colors" id="mobile-menu-button">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
                
                <!-- Desktop Navigation - refined -->
                <div class="hidden sm:flex sm:items-center sm:space-x-1">
                    <a class="text-gray-600 hover:text-green-600 px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 hover:bg-green-50" href="{% url 'product-list' %}">
                        Products
                    </a>
                    <a class="text-gray-600 hover:text-green-600 px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 hover:bg-green-50" href="{% url 'livestock-list' %}">
                        Livestock
                    </a>
                    <a class="text-gray-600 hover:text-green-600 px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 hover:bg-green-50" href="{% url 'article-list' %}">
                        Blog
                    </a>
                    <a class="text-gray-600 hover:text-green-600 px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 hover:bg-green-50" href="/admin/">
                        Admin
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Mobile Navigation - refined -->
        <div class="sm:hidden hidden" id="mobile-menu">
            <div class="px-4 pt-2 pb-3 space-y-1 bg-white border-t border-gray-100">
                <a class="text-gray-600 block px-4 py-2 rounded-lg text-base font-medium hover:bg-green-50 hover:text-green-600 transition-colors" href="{% url 'product-list' %}">
                    Products
                </a>
                <a class="text-gray-600 block px-4 py-2 rounded-lg text-base font-medium hover:bg-green-50 hover:text-green-600 transition-colors" href="{% url 'livestock-list' %}">
                    Livestock
                </a>
                <a class="text-gray-600 block px-4 py-2 rounded-lg text-base font-medium hover:bg-green-50 hover:text-green-600 transition-colors" href="{% url 'article-list' %}">
                    Blog
                </a>
                <a class="text-gray-600 block px-4 py-2 rounded-lg text-base font-medium hover:bg-green-50 hover:text-green-600 transition-colors" href="/admin/">
                    Admin
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-8xl mx-auto  py-0">
        {% block content %}
        {% endblock %}
    </main>

    <script>
        // Mobile menu toggle
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        
        if (mobileMenuButton && mobileMenu) {
            mobileMenuButton.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }
    </script>
</body>
</html>
